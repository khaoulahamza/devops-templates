name: Deploy Template

on:
  workflow_call:
    secrets:
      GITOPS_TOKEN:
        required: true

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      # ✅ Nom de l'app = nom du repo, normalisé en kebab-case minuscule
      - name: Set APP_NAME
        run: |
          APP_NAME=$(echo "${{ github.event.repository.name }}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9-]/-/g')
          echo "APP_NAME=${APP_NAME}" >> $GITHUB_ENV

      - name: Trust Nexus certificate
        run: |
          sudo mkdir -p /etc/docker/certs.d/192.168.1.239:8085
          sudo cp /home/ubuntu/nexus/certs/nexus.crt \
            /etc/docker/certs.d/192.168.1.239:8085/ca.crt
          sudo cp /home/ubuntu/nexus/certs/nexus.crt \
            /usr/local/share/ca-certificates/nexus.crt
          sudo update-ca-certificates

      - name: Docker login
        run: |
          echo "nexus111" | docker login 192.168.1.239:8085 \
            -u admin --password-stdin

      # ✅ Image propre par app, tag = sha uniquement (pas de latest)
      - name: Build image
        run: |
          docker build \
            -t 192.168.1.239:8085/selfkhaoula/${{ env.APP_NAME }}:${{ github.sha }} .

      - name: Push image
        run: |
          docker push 192.168.1.239:8085/selfkhaoula/${{ env.APP_NAME }}:${{ github.sha }}

      - name: Update GitOps values
        env:
          GITOPS_PAT: ${{ secrets.GITOPS_TOKEN }}
        run: |
          if [ -z "${GITOPS_PAT}" ]; then
            echo "❌ GITOPS_TOKEN manquant."
            exit 1
          fi

          git clone https://x-access-token:${GITOPS_PAT}@github.com/khaoulahamza/gitops-environments.git
          cd gitops-environments

          git remote set-url origin \
            https://x-access-token:${GITOPS_PAT}@github.com/khaoulahamza/gitops-environments.git
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"

          # ✅ Chemin dynamique selon l'app
          VALUES_PATH="environments/staging/${{ env.APP_NAME }}/values.yaml"

          if [ ! -f "${VALUES_PATH}" ]; then
            echo "❌ Fichier introuvable : ${VALUES_PATH}"
            find . -name "values.yaml"
            exit 1
          fi

          # ✅ Met à jour repository ET tag
          sed -i "s|repository:.*|repository: \"192.168.1.239:8085/selfkhaoula/${{ env.APP_NAME }}\"|" \
            "${VALUES_PATH}"
          sed -i "s|tag:.*|tag: \"${{ github.sha }}\"|" \
            "${VALUES_PATH}"

          git add .
          git commit -m "[${{ env.APP_NAME }}] image → ${{ github.sha }}" \
            || echo "Aucun changement"

          git push \
            https://x-access-token:${GITOPS_PAT}@github.com/khaoulahamza/gitops-environments.git \
            main
