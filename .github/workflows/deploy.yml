name: Deploy Template

on:
  workflow_call:
    secrets:
      GITOPS_TOKEN:
        required: true

jobs:
  deploy:
    runs-on: self-hosted

    steps:

      - name: Checkout application repo
        uses: actions/checkout@v4

      - name: Set APP_NAME
        run: |
          APP_NAME=$(echo "${{ github.event.repository.name }}" | tr '[:upper:]' '[:lower:]' | sed 's/[^a-z0-9-]/-/g')
          echo "APP_NAME=${APP_NAME}" >> "$GITHUB_ENV"

      - name: Detect deploy mode & frontend location
        run: |
          HAS_FRONT="false"
          HAS_BACK="false"
          FRONT_FILE=""
          FRONT_CONTEXT="."
          BACK_FILE=""
          BACK_CONTEXT="."
          MONO_FILE=""
          FRONT_AT_ROOT="false"

          if [ -f "frontend/Dockerfile" ]; then
            HAS_FRONT="true"; FRONT_FILE="frontend/Dockerfile"; FRONT_CONTEXT="frontend"
          elif [ -f "Dockerfile.frontend" ]; then
            HAS_FRONT="true"; FRONT_FILE="Dockerfile.frontend"; FRONT_CONTEXT="."
          fi

          if [ "${HAS_FRONT}" = "true" ]; then
            if [ -f "package.json" ] && [ -f "angular.json" ]; then
              FRONT_AT_ROOT="true"
            elif [ -f "frontend/package.json" ]; then
              FRONT_AT_ROOT="false"
            fi
          fi

          if [ -f "backend/Dockerfile" ]; then
            HAS_BACK="true"; BACK_FILE="backend/Dockerfile"; BACK_CONTEXT="backend"
          elif [ -f "Dockerfile.backend" ]; then
            HAS_BACK="true"; BACK_FILE="Dockerfile.backend"; BACK_CONTEXT="."
          fi

          if [ "${HAS_FRONT}" = "true" ] && [ "${HAS_BACK}" = "true" ]; then
            DEPLOY_MODE="dual"
          elif [ "${HAS_FRONT}" = "true" ]; then
            DEPLOY_MODE="front-only"
          elif [ "${HAS_BACK}" = "true" ]; then
            DEPLOY_MODE="back-only"
          elif [ -f "Dockerfile" ]; then
            DEPLOY_MODE="mono"; MONO_FILE="Dockerfile"
          else
            echo "ERREUR : aucun Dockerfile trouve."; exit 1
          fi

          echo "DEPLOY_MODE=${DEPLOY_MODE}"     >> "$GITHUB_ENV"
          echo "HAS_FRONT=${HAS_FRONT}"         >> "$GITHUB_ENV"
          echo "HAS_BACK=${HAS_BACK}"           >> "$GITHUB_ENV"
          echo "FRONT_FILE=${FRONT_FILE}"       >> "$GITHUB_ENV"
          echo "FRONT_CONTEXT=${FRONT_CONTEXT}" >> "$GITHUB_ENV"
          echo "BACK_FILE=${BACK_FILE}"         >> "$GITHUB_ENV"
          echo "BACK_CONTEXT=${BACK_CONTEXT}"   >> "$GITHUB_ENV"
          echo "MONO_FILE=${MONO_FILE}"         >> "$GITHUB_ENV"
          echo "FRONT_AT_ROOT=${FRONT_AT_ROOT}" >> "$GITHUB_ENV"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Test frontend (Node.js)
        if: >
          env.HAS_FRONT == 'true' &&
          (hashFiles('package.json') != '' || hashFiles('frontend/package.json') != '')
        run: |
          if [ "${{ env.FRONT_AT_ROOT }}" = "true" ]; then
            npm install && npm test
          else
            cd frontend && npm install && npm test
          fi

      - name: Test backend (Java / Maven)
        if: hashFiles('backend/pom.xml') != ''
        run: cd backend && mvn test

      - name: Test backend (Python / pytest)
        if: hashFiles('backend/requirements.txt') != ''
        run: |
          cd backend
          pip install -r requirements.txt
          pytest

      - name: Test backend (Go)
        if: hashFiles('backend/go.mod') != ''
        run: cd backend && go test ./...

      - name: Lint frontend (Angular / ESLint)
        if: >
          env.HAS_FRONT == 'true' &&
          (hashFiles('package.json') != '' || hashFiles('frontend/package.json') != '')
        run: |
          if [ "${{ env.FRONT_AT_ROOT }}" = "true" ]; then
            if node -e "const p=require('./package.json'); process.exit(p.scripts&&p.scripts.lint?0:1);" 2>/dev/null; then
              npm run lint
            fi
          else
            cd frontend
            if node -e "const p=require('./package.json'); process.exit(p.scripts&&p.scripts.lint?0:1);" 2>/dev/null; then
              npm run lint
            fi
          fi

      - name: Lint backend (Spring Boot / Checkstyle)
        if: hashFiles('backend/pom.xml') != ''
        run: |
          if grep -qi "checkstyle" backend/pom.xml; then
            cd backend && mvn checkstyle:check
          fi

      - name: Lint Dockerfiles (hadolint)
        run: |
          lint_dockerfile() {
            local FILE="$1"
            [ -z "${FILE}" ] || [ ! -f "${FILE}" ] && return 0
            docker run --rm -i hadolint/hadolint < "${FILE}"
          }
          case "${{ env.DEPLOY_MODE }}" in
            dual)       lint_dockerfile "${{ env.FRONT_FILE }}"; lint_dockerfile "${{ env.BACK_FILE }}" ;;
            front-only) lint_dockerfile "${{ env.FRONT_FILE }}" ;;
            back-only)  lint_dockerfile "${{ env.BACK_FILE }}" ;;
            mono)       lint_dockerfile "${{ env.MONO_FILE }}" ;;
          esac

      - name: Trust Nexus certificate
        run: |
          sudo mkdir -p /etc/docker/certs.d/192.168.1.239:8085
          sudo cp /home/ubuntu/nexus/certs/nexus.crt /etc/docker/certs.d/192.168.1.239:8085/ca.crt
          sudo cp /home/ubuntu/nexus/certs/nexus.crt /usr/local/share/ca-certificates/nexus.crt
          sudo update-ca-certificates

      - name: Docker login to Nexus registry
        run: echo "nexus111" | docker login 192.168.1.239:8085 -u admin --password-stdin

      - name: Build & push image (mono)
        if: env.DEPLOY_MODE == 'mono'
        run: |
          IMAGE="192.168.1.239:8085/selfkhaoula/${{ env.APP_NAME }}:${{ github.sha }}"
          docker build -f "${{ env.MONO_FILE }}" -t "${IMAGE}" .
          docker push "${IMAGE}"

      - name: Build & push image (front-only)
        if: env.DEPLOY_MODE == 'front-only'
        run: |
          IMAGE="192.168.1.239:8085/selfkhaoula/${{ env.APP_NAME }}-front:${{ github.sha }}"
          docker build -f "${{ env.FRONT_FILE }}" -t "${IMAGE}" "${{ env.FRONT_CONTEXT }}"
          docker push "${IMAGE}"

      - name: Build & push image (back-only)
        if: env.DEPLOY_MODE == 'back-only'
        run: |
          IMAGE="192.168.1.239:8085/selfkhaoula/${{ env.APP_NAME }}-back:${{ github.sha }}"
          docker build -f "${{ env.BACK_FILE }}" -t "${IMAGE}" "${{ env.BACK_CONTEXT }}"
          docker push "${IMAGE}"

      - name: Build & push frontend image (dual)
        if: env.DEPLOY_MODE == 'dual'
        run: |
          IMAGE="192.168.1.239:8085/selfkhaoula/${{ env.APP_NAME }}-front:${{ github.sha }}"
          docker build -f "${{ env.FRONT_FILE }}" -t "${IMAGE}" "${{ env.FRONT_CONTEXT }}"
          docker push "${IMAGE}"

      - name: Build & push backend image (dual)
        if: env.DEPLOY_MODE == 'dual'
        run: |
          IMAGE="192.168.1.239:8085/selfkhaoula/${{ env.APP_NAME }}-back:${{ github.sha }}"
          docker build -f "${{ env.BACK_FILE }}" -t "${IMAGE}" "${{ env.BACK_CONTEXT }}"
          docker push "${IMAGE}"

      - name: Update GitOps repo
        env:
          GITOPS_PAT: ${{ secrets.GITOPS_TOKEN }}
        run: |
          APP_NAME="${{ env.APP_NAME }}"
          SHA="${{ github.sha }}"
          REGISTRY="192.168.1.239:8085/selfkhaoula"
          GITOPS_REPO="https://x-access-token:${GITOPS_PAT}@github.com/khaoulahamza/gitops-environments.git"

          git clone "${GITOPS_REPO}" gitops-environments
          cd gitops-environments
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"

          write_values() {
            local COMP="$1" REPO="$2" TAG="$3"
            local DIR="environments/staging/${COMP}"
            local VPATH="${DIR}/values.yaml"
            mkdir -p "${DIR}"
            if [ ! -f "${VPATH}" ]; then
              printf 'name: %s\nreplicaCount: 1\nimage:\n  repository: "%s"\n  tag: "%s"\n  pullPolicy: IfNotPresent\nimagePullSecrets:\n  - name: nexus-registry-secret\nservice:\n  type: ClusterIP\n  port: 80\n  targetPort: 80\ningress:\n  enabled: true\n  className: nginx\n  host: %s.staging.local\n  path: /\n  pathType: Prefix\nresources:\n  limits:\n    cpu: 500m\n    memory: 512Mi\n  requests:\n    cpu: 250m\n    memory: 256Mi\nenv: []\n' \
                "${COMP}" "${REPO}" "${TAG}" "${COMP}" > "${VPATH}"
            else
              sed -i "s|repository:.*|repository: \"${REPO}\"|" "${VPATH}"
              sed -i "s|tag:.*|tag: \"${TAG}\"|" "${VPATH}"
            fi
          }

          write_argocd() {
            local COMP="$1"
            local APATH="argocd-applications/${COMP}.yaml"
            mkdir -p argocd-applications
            if [ ! -f "${APATH}" ]; then
              printf 'apiVersion: argoproj.io/v1alpha1\nkind: Application\nmetadata:\n  name: %s\n  namespace: argocd\nspec:\n  project: stagiaires\n  sources:\n    - repoURL: https://github.com/khaoulahamza/devops-templates\n      targetRevision: main\n      path: helm-charts/app-generic\n      helm:\n        valueFiles:\n          - $values/environments/staging/%s/values.yaml\n    - repoURL: https://github.com/khaoulahamza/gitops-environments\n      targetRevision: main\n      ref: values\n  destination:\n    server: https://kubernetes.default.svc\n    namespace: staging-%s\n  syncPolicy:\n    automated:\n      prune: true\n      selfHeal: true\n    syncOptions:\n      - CreateNamespace=true\n' \
                "${COMP}" "${COMP}" "${COMP}" > "${APATH}"
            fi
          }

          case "${{ env.DEPLOY_MODE }}" in
            mono)
              write_values "${APP_NAME}" "${REGISTRY}/${APP_NAME}" "${SHA}"
              write_argocd "${APP_NAME}"
              COMMIT_MSG="[${APP_NAME}] deploy -> ${SHA}"
              ;;
            front-only)
              write_values "${APP_NAME}-front" "${REGISTRY}/${APP_NAME}-front" "${SHA}"
              write_argocd "${APP_NAME}-front"
              COMMIT_MSG="[${APP_NAME}] deploy front -> ${SHA}"
              ;;
            back-only)
              write_values "${APP_NAME}-back" "${REGISTRY}/${APP_NAME}-back" "${SHA}"
              write_argocd "${APP_NAME}-back"
              COMMIT_MSG="[${APP_NAME}] deploy back -> ${SHA}"
              ;;
            dual)
              write_values "${APP_NAME}-front" "${REGISTRY}/${APP_NAME}-front" "${SHA}"
              write_values "${APP_NAME}-back"  "${REGISTRY}/${APP_NAME}-back"  "${SHA}"
              write_argocd "${APP_NAME}-front"
              write_argocd "${APP_NAME}-back"
              COMMIT_MSG="[${APP_NAME}] deploy front+back -> ${SHA}"
              ;;
          esac

          git add .
          git diff --cached --quiet || git commit -m "${COMMIT_MSG}"
          git push "${GITOPS_REPO}" main
