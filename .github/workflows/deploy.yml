name: Deploy Template
on:
  workflow_call:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Trust Nexus self-signed certificate
        run: |
          sudo cp /etc/docker/certs.d/192.168.1.239:8085/ca.crt \
            /usr/local/share/ca-certificates/nexus.crt
          sudo update-ca-certificates

      - name: Docker login
        run: |
          echo "nexus111" | docker login https://192.168.1.239:8085 \
            -u admin --password-stdin

      - name: Build image
        run: |
          docker build -t 192.168.1.239:8085/nexusprivate/app:${{ github.sha }} \
                       -t 192.168.1.239:8085/nexusprivate/app:latest .

      - name: Push image
        run: |
          docker push 192.168.1.239:8085/nexusprivate/app:${{ github.sha }}
          docker push 192.168.1.239:8085/nexusprivate/app:latest
