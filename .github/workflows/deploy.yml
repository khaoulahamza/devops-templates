# ============================================================
#  Deploy Template — Reusable workflow (workflow_call)
#
#  Modes détectés automatiquement :
#    • front-only : Dockerfile frontend uniquement
#    • back-only  : Dockerfile backend uniquement
#    • dual       : Dockerfile frontend + backend
#    • mono       : Dockerfile unique à la racine (compat.)
#
#  Dockerfiles reconnus :
#    Frontend : frontend/Dockerfile  ou  Dockerfile.frontend
#    Backend  : backend/Dockerfile   ou  Dockerfile.backend
#    Mono     : Dockerfile (racine)
#
#  Supports deux structures pour le frontend :
#    - Frontend à la racine (angular.json, package.json, src/)
#    - Frontend dans dossier frontend/
#
#  Pipeline :
#    0. Checkout
#    1. Normalise APP_NAME
#    2. Détection du mode + emplacement frontend
#    3. Tests unitaires (Node.js / Maven / pytest / Go)
#    4. Lint frontend (Angular ESLint — non-bloquant)
#    5. Lint backend (Checkstyle — non-bloquant)
#    6. Lint Dockerfiles (hadolint — bloquant)
#    7. Trust Nexus certificate
#    8. Docker login
#    9. Build & push image(s)
#   10. Update GitOps repo
# ============================================================

name: Deploy Template

on:
  workflow_call:
    secrets:
      GITOPS_TOKEN:
        required: true

jobs:
  deploy:
    runs-on: self-hosted

    steps:

      # ── 0. Checkout ──────────────────────────────────────────────
      - name: Checkout application repo
        uses: actions/checkout@v4

      # ── 1. Normalise APP_NAME ────────────────────────────────────
      - name: Set APP_NAME
        run: |
          APP_NAME=$(echo "${{ github.event.repository.name }}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9-]/-/g')
          echo "APP_NAME=${APP_NAME}" >> "$GITHUB_ENV"

      # ── 2. Détection du mode et emplacement frontend ─────────────
      - name: Detect deploy mode & frontend location
        run: |
          DEPLOY_MODE=""
          HAS_FRONT="false"
          HAS_BACK="false"
          FRONT_FILE=""
          FRONT_CONTEXT="."
          BACK_FILE=""
          BACK_CONTEXT="."
          MONO_FILE=""
          FRONT_AT_ROOT="false"

          # --- Détection frontend ---
          if [ -f "frontend/Dockerfile" ]; then
            HAS_FRONT="true"
            FRONT_FILE="frontend/Dockerfile"
            FRONT_CONTEXT="frontend"
            echo "→ frontend Dockerfile : frontend/Dockerfile"
          elif [ -f "Dockerfile.frontend" ]; then
            HAS_FRONT="true"
            FRONT_FILE="Dockerfile.frontend"
            FRONT_CONTEXT="."
            echo "→ frontend Dockerfile : Dockerfile.frontend"
          fi

          # Si frontend détecté, vérifier où se trouve package.json
          if [ "${HAS_FRONT}" = "true" ]; then
            if [ -f "package.json" ] && [ -f "angular.json" ]; then
              FRONT_AT_ROOT="true"
              echo "→ Frontend à la racine (package.json + angular.json)"
            elif [ -f "frontend/package.json" ]; then
              FRONT_AT_ROOT="false"
              echo "→ Frontend dans dossier frontend/"
            else
              echo "⚠ Aucun package.json trouvé pour le frontend (lint/tests ignorés)"
            fi
          fi

          # --- Détection backend ---
          if [ -f "backend/Dockerfile" ]; then
            HAS_BACK="true"
            BACK_FILE="backend/Dockerfile"
            BACK_CONTEXT="backend"
            echo "→ backend Dockerfile : backend/Dockerfile"
          elif [ -f "Dockerfile.backend" ]; then
            HAS_BACK="true"
            BACK_FILE="Dockerfile.backend"
            BACK_CONTEXT="."
            echo "→ backend Dockerfile : Dockerfile.backend"
          fi

          # --- Choix du mode ---
          if [ "${HAS_FRONT}" = "true" ] && [ "${HAS_BACK}" = "true" ]; then
            DEPLOY_MODE="dual"
          elif [ "${HAS_FRONT}" = "true" ] && [ "${HAS_BACK}" = "false" ]; then
            DEPLOY_MODE="front-only"
          elif [ "${HAS_BACK}" = "true" ] && [ "${HAS_FRONT}" = "false" ]; then
            DEPLOY_MODE="back-only"
          elif [ -f "Dockerfile" ]; then
            DEPLOY_MODE="mono"
            MONO_FILE="Dockerfile"
          else
            echo "❌ ERREUR : aucun Dockerfile trouvé."
            exit 1
          fi

          echo "DEPLOY_MODE=${DEPLOY_MODE}"           >> "$GITHUB_ENV"
          echo "HAS_FRONT=${HAS_FRONT}"               >> "$GITHUB_ENV"
          echo "HAS_BACK=${HAS_BACK}"                 >> "$GITHUB_ENV"
          echo "FRONT_FILE=${FRONT_FILE}"             >> "$GITHUB_ENV"
          echo "FRONT_CONTEXT=${FRONT_CONTEXT}"       >> "$GITHUB_ENV"
          echo "BACK_FILE=${BACK_FILE}"               >> "$GITHUB_ENV"
          echo "BACK_CONTEXT=${BACK_CONTEXT}"         >> "$GITHUB_ENV"
          echo "MONO_FILE=${MONO_FILE}"               >> "$GITHUB_ENV"
          echo "FRONT_AT_ROOT=${FRONT_AT_ROOT}"       >> "$GITHUB_ENV"

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  DEPLOY_MODE        = ${DEPLOY_MODE}"
          echo "  FRONT_AT_ROOT      = ${FRONT_AT_ROOT}"
          echo "  FRONT_FILE         = ${FRONT_FILE}"
          echo "  BACK_FILE          = ${BACK_FILE}"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      # ── 3. Tests unitaires ───────────────────────────────────────
      # Frontend Node.js (soit à la racine, soit dans frontend/)
      - name: Test frontend (Node.js)
        if: env.HAS_FRONT == 'true' && (hashFiles('package.json') != '' || hashFiles('frontend/package.json') != '')
        run: |
          echo "▶ Tests Node.js frontend"
          if [ "${{ env.FRONT_AT_ROOT }}" = "true" ]; then
            npm install
            npm test
          else
            cd frontend
            npm install
            npm test
          fi

      # Backend Java / Maven
      - name: Test backend (Java / Maven)
        if: hashFiles('backend/pom.xml') != ''
        run: |
          echo "▶ Tests Maven backend"
          cd backend && mvn test

      # Backend Python
      - name: Test backend (Python / pytest)
        if: hashFiles('backend/requirements.txt') != ''
        run: |
          echo "▶ Tests pytest backend"
          cd backend
          pip install -r requirements.txt
          pytest

      # Backend Go
      - name: Test backend (Go)
        if: hashFiles('backend/go.mod') != ''
        run: |
          echo "▶ Tests Go backend"
          cd backend && go test ./...

      # ── 4. Lint frontend (Angular / ESLint) ──────────────────────
      - name: Lint frontend (Angular / ESLint)
        if: env.HAS_FRONT == 'true' && (hashFiles('package.json') != '' || hashFiles('frontend/package.json') != '')
        run: |
          echo "▶ Vérification du script lint"
          if [ "${{ env.FRONT_AT_ROOT }}" = "true" ]; then
            if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts.lint ? 0 : 1);" 2>/dev/null; then
              echo "✔ script lint trouvé — npm run lint"
              npm run lint
            else
              echo "⚠ Aucun script lint dans package.json"
            fi
          else
            cd frontend
            if node -e "const p=require('./package.json'); process.exit(p.scripts && p.scripts.lint ? 0 : 1);" 2>/dev/null; then
              echo "✔ script lint trouvé — npm run lint"
              npm run lint
            else
              echo "⚠ Aucun script lint dans frontend/package.json"
            fi
          fi

      # ── 5. Lint backend (Checkstyle) ─────────────────────────────
      - name: Lint backend (Spring Boot / Checkstyle)
        if: hashFiles('backend/pom.xml') != ''
        run: |
          echo "▶ Vérification de maven-checkstyle-plugin"
          if grep -qi "checkstyle" backend/pom.xml; then
            cd backend && mvn checkstyle:check
          else
            echo "⚠ Checkstyle non configuré"
          fi

      # ── 6. Lint Dockerfiles (hadolint) ──────────────────────────
      - name: Lint Dockerfiles (hadolint)
        run: |
          lint_dockerfile() {
            local FILE="$1"
            if [ -z "${FILE}" ] || [ ! -f "${FILE}" ]; then
              echo "⚠ Dockerfile absent : ${FILE}"
              return 0
            fi
            echo "▶ hadolint → ${FILE}"
            docker run --rm -i hadolint/hadolint < "${FILE}"
            echo "✔ ${FILE}"
          }

          case "${{ env.DEPLOY_MODE }}" in
            dual)
              lint_dockerfile "${{ env.FRONT_FILE }}"
              lint_dockerfile "${{ env.BACK_FILE }}"
              ;;
            front-only)
              lint_dockerfile "${{ env.FRONT_FILE }}"
              ;;
            back-only)
              lint_dockerfile "${{ env.BACK_FILE }}"
              ;;
            mono)
              lint_dockerfile "${{ env.MONO_FILE }}"
              ;;
          esac

      # ── 7. Trust Nexus certificate ───────────────────────────────
      - name: Trust Nexus certificate
        run: |
          sudo mkdir -p /etc/docker/certs.d/192.168.1.239:8085
          sudo cp /home/ubuntu/nexus/certs/nexus.crt \
            /etc/docker/certs.d/192.168.1.239:8085/ca.crt
          sudo cp /home/ubuntu/nexus/certs/nexus.crt \
            /usr/local/share/ca-certificates/nexus.crt
          sudo update-ca-certificates

      # ── 8. Docker login ──────────────────────────────────────────
      - name: Docker login to Nexus registry
        run: |
          echo "nexus111" | docker login 192.168.1.239:8085 \
            -u admin --password-stdin

      # ── 9. Build & push image(s) ─────────────────────────────────
      - name: Build & push image (mono)
        if: env.DEPLOY_MODE == 'mono'
        run: |
          IMAGE="192.168.1.239:8085/selfkhaoula/${{ env.APP_NAME }}:${{ github.sha }}"
          docker build -f "${{ env.MONO_FILE }}" -t "${IMAGE}" .
          docker push "${IMAGE}"

      - name: Build & push image (front-only)
        if: env.DEPLOY_MODE == 'front-only'
        run: |
          IMAGE="192.168.1.239:8085/selfkhaoula/${{ env.APP_NAME }}-front:${{ github.sha }}"
          docker build -f "${{ env.FRONT_FILE }}" -t "${IMAGE}" "${{ env.FRONT_CONTEXT }}"
          docker push "${IMAGE}"

      - name: Build & push image (back-only)
        if: env.DEPLOY_MODE == 'back-only'
        run: |
          IMAGE="192.168.1.239:8085/selfkhaoula/${{ env.APP_NAME }}-back:${{ github.sha }}"
          docker build -f "${{ env.BACK_FILE }}" -t "${IMAGE}" "${{ env.BACK_CONTEXT }}"
          docker push "${IMAGE}"

      - name: Build & push frontend image (dual)
        if: env.DEPLOY_MODE == 'dual'
        run: |
          IMAGE="192.168.1.239:8085/selfkhaoula/${{ env.APP_NAME }}-front:${{ github.sha }}"
          docker build -f "${{ env.FRONT_FILE }}" -t "${IMAGE}" "${{ env.FRONT_CONTEXT }}"
          docker push "${IMAGE}"

      - name: Build & push backend image (dual)
        if: env.DEPLOY_MODE == 'dual'
        run: |
          IMAGE="192.168.1.239:8085/selfkhaoula/${{ env.APP_NAME }}-back:${{ github.sha }}"
          docker build -f "${{ env.BACK_FILE }}" -t "${IMAGE}" "${{ env.BACK_CONTEXT }}"
          docker push "${IMAGE}"

      # ── 10. Update GitOps repo ───────────────────────────────────
      - name: Update GitOps repo
        env:
          GITOPS_PAT: ${{ secrets.GITOPS_TOKEN }}
        run: |
          APP_NAME="${{ env.APP_NAME }}"
          SHA="${{ github.sha }}"
          REGISTRY="192.168.1.239:8085/selfkhaoula"
          GITOPS_REPO="https://x-access-token:${GITOPS_PAT}@github.com/khaoulahamza/gitops-environments.git"

          git clone "${GITOPS_REPO}" gitops-environments
          cd gitops-environments
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"

          write_values() {
            local COMP="$1" REPO="$2" TAG="$3"
            local DIR="environments/staging/${COMP}"
            local VPATH="${DIR}/values.yaml"
            mkdir -p "${DIR}"
            if [ ! -f "${VPATH}" ]; then
              cat > "${VPATH}" <<EOF
name: ${COMP}
replicaCount: 1
image:
  repository: "${REPO}"
  tag: "${TAG}"
  pullPolicy: IfNotPresent
imagePullSecrets:
  - name: nexus-registry-secret
service:
  type: ClusterIP
  port: 80
  targetPort: 80
ingress:
  enabled: true
  className: nginx
  host: ${COMP}.staging.local
  path: /
  pathType: Prefix
resources:
  limits:
    cpu: 500m
    memory: 512Mi
  requests:
    cpu: 250m
    memory: 256Mi
env: []
EOF
            else
              sed -i "s|repository:.*|repository: \"${REPO}\"|" "${VPATH}"
              sed -i "s|tag:.*|tag: \"${TAG}\"|" "${VPATH}"
            fi
          }

          write_argocd() {
            local COMP="$1"
            local APATH="argocd-applications/${COMP}.yaml"
            mkdir -p argocd-applications
            if [ ! -f "${APATH}" ]; then
              cat > "${APATH}" <<EOF
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ${COMP}
  namespace: argocd
spec:
  project: stagiaires
  sources:
    - repoURL: https://github.com/khaoulahamza/devops-templates
      targetRevision: main
      path: helm-charts/app-generic
      helm:
        valueFiles:
          - \$values/environments/staging/${COMP}/values.yaml
    - repoURL: https://github.com/khaoulahamza/gitops-environments
      targetRevision: main
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: staging-${COMP}
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
EOF
            fi
          }

          MODE="${{ env.DEPLOY_MODE }}"
          case "${MODE}" in
            mono)
              write_values "${APP_NAME}" "${REGISTRY}/${APP_NAME}" "${SHA}"
              write_argocd "${APP_NAME}"
              COMMIT_MSG="[${APP_NAME}] deploy -> ${SHA}"
              ;;
            front-only)
              write_values "${APP_NAME}-front" "${REGISTRY}/${APP_NAME}-front" "${SHA}"
              write_argocd "${APP_NAME}-front"
              COMMIT_MSG="[${APP_NAME}] deploy front -> ${SHA}"
              ;;
            back-only)
              write_values "${APP_NAME}-back" "${REGISTRY}/${APP_NAME}-back" "${SHA}"
              write_argocd "${APP_NAME}-back"
              COMMIT_MSG="[${APP_NAME}] deploy back -> ${SHA}"
              ;;
            dual)
              write_values "${APP_NAME}-front" "${REGISTRY}/${APP_NAME}-front" "${SHA}"
              write_values "${APP_NAME}-back"  "${REGISTRY}/${APP_NAME}-back"  "${SHA}"
              write_argocd "${APP_NAME}-front"
              write_argocd "${APP_NAME}-back"
              COMMIT_MSG="[${APP_NAME}] deploy front+back -> ${SHA}"
              ;;
          esac

          git add .
          git diff --cached --quiet || git commit -m "${COMMIT_MSG}"
          git push "${GITOPS_REPO}" main
