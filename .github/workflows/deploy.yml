name: Deploy Template

on:
  workflow_call:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Allow insecure registry
        run: |
          echo '{"insecure-registries": ["${{ env.NEXUS_REGISTRY }}"]}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker

      - name: Docker login
        run: echo "${{ env.NEXUS_PASSWORD }}" | docker login ${{ env.NEXUS_REGISTRY }} -u ${{ env.NEXUS_USERNAME }} --password-stdin

      - name: Build image
        run: docker build -t ${{ env.NEXUS_REGISTRY }}/app:${{ github.sha }} .

      - name: Push image
        run: docker push ${{ env.NEXUS_REGISTRY }}/app:${{ github.sha }}
