name: Deploy Template

on:
  workflow_call:

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Trust Nexus self-signed certificate
        run: |
          sudo mkdir -p /etc/docker/certs.d/192.168.1.239:8085

          sudo cp /home/ubuntu/nexus/certs/nexus.crt \
            /etc/docker/certs.d/192.168.1.239:8085/ca.crt

          sudo cp /home/ubuntu/nexus/certs/nexus.crt \
            /usr/local/share/ca-certificates/nexus.crt

          sudo update-ca-certificates

      - name: Docker login
        run: |
          echo "nexus111" | docker login 192.168.1.239:8085 \
            -u admin --password-stdin

      - name: Build image
        run: |
          docker build \
            -t 192.168.1.239:8085/selfkhaoula/app:${{ github.sha }} \
            -t 192.168.1.239:8085/selfkhaoula/app:latest .

      - name: Push image
        run: |
          docker push 192.168.1.239:8085/selfkhaoula/app:${{ github.sha }}
          docker push 192.168.1.239:8085/selfkhaoula/app:latest

      - name: Update GitOps values
        env:
          GITOPS_PAT: ${{ secrets.GITOPS_TOKEN }}
        run: |
          # Configurer git pour utiliser le token
          git config --global credential.helper store
          echo "https://x-access-token:${GITOPS_PAT}@github.com" > ~/.git-credentials

          # Cloner normalement
          git clone https://github.com/khaoulahamza/gitops-environments.git

          cd gitops-environments

          # Config git
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"

          # Vérifier et mettre à jour
          if [ ! -f "environments/staging/my-angular-app/values.yaml" ]; then
            echo "❌ File not found!"
            find . -name "values.yaml"
            exit 1
          fi

          sed -i "s|tag:.*|tag: \"${{ github.sha }}\"|" \
            environments/staging/my-angular-app/values.yaml

          git add .
          git commit -m "update image tag to ${{ github.sha }}" || echo "No changes to commit"

          # Push
          git push origin main
