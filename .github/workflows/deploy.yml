name: Deploy Template

on:
  workflow_call:
    secrets:
      GITOPS_TOKEN:
        required: true

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      - name: Trust Nexus self-signed certificate
        run: |
          sudo mkdir -p /etc/docker/certs.d/192.168.1.239:8085
          sudo cp /home/ubuntu/nexus/certs/nexus.crt \
            /etc/docker/certs.d/192.168.1.239:8085/ca.crt
          sudo cp /home/ubuntu/nexus/certs/nexus.crt \
            /usr/local/share/ca-certificates/nexus.crt
          sudo update-ca-certificates

      - name: Docker login
        run: |
          echo "nexus111" | docker login 192.168.1.239:8085 \
            -u admin --password-stdin

      - name: Build image
        run: |
          docker build \
            -t 192.168.1.239:8085/selfkhaoula/app:${{ github.sha }} \
            -t 192.168.1.239:8085/selfkhaoula/app:latest .

      - name: Push image
        run: |
          docker push 192.168.1.239:8085/selfkhaoula/app:${{ github.sha }}
          docker push 192.168.1.239:8085/selfkhaoula/app:latest

      - name: Update GitOps values
        env:
          GITOPS_PAT: ${{ secrets.GITOPS_TOKEN }}
        run: |
          # Vérifier que le token est bien reçu
          if [ -z "${GITOPS_PAT}" ]; then
            echo "❌ Le secret GITOPS_TOKEN n'est pas transmis au workflow."
            exit 1
          fi
          echo "✅ Secret reçu (longueur: ${#GITOPS_PAT})"

          # Cloner avec le token dans l'URL
          git clone https://x-access-token:${GITOPS_PAT}@github.com/khaoulahamza/gitops-environments.git
          cd gitops-environments

          # Reconfigurer le remote pour qu'il utilise aussi le token (sécurité)
          git remote set-url origin https://x-access-token:${GITOPS_PAT}@github.com/khaoulahamza/gitops-environments.git

          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"

          # Vérifier l'existence du fichier values.yaml
          if [ ! -f "environments/staging/my-angular-app/values.yaml" ]; then
            echo "❌ Fichier introuvable : environments/staging/my-angular-app/values.yaml"
            find . -name "values.yaml"
            exit 1
          fi

          # Mettre à jour le tag
          sed -i "s|tag:.*|tag: \"${{ github.sha }}\"|" \
            environments/staging/my-angular-app/values.yaml

          git add .
          git commit -m "update image tag to ${{ github.sha }}" || echo "Aucun changement à committer"

          # Pousser avec l'URL complète contenant le token
          git push https://x-access-token:${GITOPS_PAT}@github.com/khaoulahamza/gitops-environments.git main
