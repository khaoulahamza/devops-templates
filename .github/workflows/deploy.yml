name: Deploy Template

on:
  workflow_call:
    secrets:
      NEXUS_USERNAME:
        required: true
      NEXUS_PASSWORD:
        required: true
    inputs:
      registry_url:
        description: 'Nexus Docker registry URL (IP:port)'
        required: true
        type: string

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Login to Nexus Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ inputs.registry_url }}
          username: ${{ secrets.NEXUS_USERNAME }}
          password: ${{ secrets.NEXUS_PASSWORD }}

      - name: Build Docker image
        run: docker build -t ${{ inputs.registry_url }}/app:${{ github.sha }} .

      - name: Push Docker image
        run: docker push ${{ inputs.registry_url }}/app:${{ github.sha }}
