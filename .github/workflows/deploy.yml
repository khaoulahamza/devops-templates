name: Deploy Template

on:
  workflow_call:
    secrets:
      GITOPS_TOKEN:
        required: true

jobs:
  detect:
    runs-on: self-hosted
    outputs:
      mode: ${{ steps.detect.outputs.mode }}
    steps:
      - name: Clean workspace
        run: |
          sudo git clean -ffdx 2>/dev/null || \
          sudo find "${{ github.workspace }}" -mindepth 1 -delete 2>/dev/null || true
      - uses: actions/checkout@v4
      - name: Detect mono vs micro
        id: detect
        run: |
          SERVICE_COUNT=0
          for dir in */; do
            dir="${dir%/}"
            case "${dir}" in
              frontend|backend|.github|.git|node_modules|target|dist|docs|scripts|config|helm|k8s) continue ;;
            esac
            [ -f "${dir}/Dockerfile" ] && SERVICE_COUNT=$((SERVICE_COUNT + 1))
          done
          HAS_CLASSIC="false"
          { [ -f "frontend/Dockerfile" ] || [ -f "Dockerfile.frontend" ] || \
            [ -f "backend/Dockerfile"  ] || [ -f "Dockerfile.backend"  ] || \
            [ -f "Dockerfile" ]; } && HAS_CLASSIC="true"
          if [ "${SERVICE_COUNT}" -ge 2 ] && [ "${HAS_CLASSIC}" = "false" ]; then
            echo "mode=micro" >> "$GITHUB_OUTPUT"
            echo "✅ Mode détecté : MICROSERVICES (${SERVICE_COUNT} services)"
          else
            echo "mode=mono" >> "$GITHUB_OUTPUT"
            echo "✅ Mode détecté : MONO"
          fi

  mono:
    needs: detect
    if: needs.detect.outputs.mode == 'mono'
    uses: winddevops-org/devops-templates/.github/workflows/mono-pipeline.yml@main
    secrets:
      GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}

  micro:
    needs: detect
    if: needs.detect.outputs.mode == 'micro'
    uses: winddevops-org/devops-templates/.github/workflows/micro-pipeline.yml@main
    secrets:
      GITOPS_TOKEN: ${{ secrets.GITOPS_TOKEN }}
