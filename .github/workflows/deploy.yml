name: Deploy Template

on:
  workflow_call:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Allow insecure registry
        run: |
          echo '{"insecure-registries": ["192.168.1.239:8081"]}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker

      - name: Docker login
        run: echo "nexus111" | docker login 192.168.1.239:8081 -u admin --password-stdin

      - name: Build image
        run: docker build -t 192.168.1.239:8081/privatekh/app:${{ github.sha }} .

      - name: Push image
        run: docker push 192.168.1.239:8081/privatekh/app:${{ github.sha }}
