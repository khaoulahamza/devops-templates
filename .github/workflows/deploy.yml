name: Deploy Template Debug

on:
  workflow_call:
    secrets:
      GITOPS_TOKEN:
        required: true

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - uses: actions/checkout@v4

      # =========================
      # 1. DEBUG SECRET (SANS EXPOSER)
      # =========================
      - name: Debug secret presence
        env:
          GITOPS_PAT: ${{ secrets.GITOPS_TOKEN }}
        run: |
          echo "=== DEBUG SECRET ==="

          if [ -z "$GITOPS_PAT" ]; then
            echo "❌ SECRET VIDE OU NON TRANSMIS"
            exit 1
          else
            echo "✅ SECRET BIEN REÇU (longueur): ${#GITOPS_PAT}"
          fi

      # =========================
      # 2. DEBUG GIT CONFIG
      # =========================
      - name: Debug git config
        run: |
          git --version
          git config --global --list || true

      # =========================
      # 3. CLONE AVEC TOKEN (DEBUG AUTH)
      # =========================
      - name: Clone repo GitOps (debug auth)
        env:
          GITOPS_PAT: ${{ secrets.GITOPS_TOKEN }}
        run: |
          echo "=== CLONING REPO ==="

          set -x

          git clone https://x-access-token:${GITOPS_PAT}@github.com/khaoulahamza/gitops-environments.git

          cd gitops-environments
          git status

      # =========================
      # 4. MODIFICATION FILE
      # =========================
      - name: Update values.yaml
        run: |
          cd gitops-environments

          echo "=== FILE CHECK ==="
          find . -name "values.yaml"

          sed -i "s|tag:.*|tag: \"${{ github.sha }}\"|" \
            environments/staging/my-angular-app/values.yaml

          cat environments/staging/my-angular-app/values.yaml

      # =========================
      # 5. COMMIT DEBUG
      # =========================
      - name: Commit changes
        run: |
          cd gitops-environments

          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"

          git add .

          git status

          git commit -m "update image tag to ${{ github.sha }}" || echo "No changes"

      # =========================
      # 6. PUSH DEBUG
      # =========================
      - name: Push changes (debug)
        env:
          GITOPS_PAT: ${{ secrets.GITOPS_TOKEN }}
        run: |
          cd gitops-environments

          echo "=== PUSH DEBUG ==="

          set -x

          git remote -v

          git push https://x-access-token:${GITOPS_PAT}@github.com/khaoulahamza/gitops-environments.git main
