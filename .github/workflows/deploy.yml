name: Deploy Template

on:
  workflow_call:
    secrets:
      NEXUS_USERNAME:
        required: true
      NEXUS_PASSWORD:
        required: true
      NEXUS_REGISTRY:
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Allow insecure registry (HTTP only)
        run: |
          echo '{"insecure-registries": ["${{ secrets.NEXUS_REGISTRY }}"]}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker

      - name: Log in to Nexus Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.NEXUS_REGISTRY }}
          username: ${{ secrets.NEXUS_USERNAME }}
          password: ${{ secrets.NEXUS_PASSWORD }}

      - name: Build Docker image
        run: docker build -t ${{ secrets.NEXUS_REGISTRY }}/app:${{ github.sha }} .

      - name: Push Docker image to Nexus
        run: docker push ${{ secrets.NEXUS_REGISTRY }}/app:${{ github.sha }}
