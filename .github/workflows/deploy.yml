name: Deploy Template

on:
  workflow_call:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Configure Docker for insecure registry (IPv4 only)
        run: |
          sudo mkdir -p /etc/docker
          echo '{"insecure-registries": ["127.0.0.1:8085"]}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker
          sleep 3

      - name: Docker login (using IPv4)
        run: echo "nexus111" | docker login 127.0.0.1:8085 -u admin --password-stdin

      - name: Build image
        run: docker build -t 127.0.0.1:8085/docker-hub/app:${{ github.sha }} .

      - name: Push image
        run: docker push 127.0.0.1:8085/docker-hub/app:${{ github.sha }}
