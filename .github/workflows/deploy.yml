name: Deploy Template

on:
  workflow_call:

jobs:
  deploy:
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Allow insecure registry
        run: |
          echo '{"insecure-registries": ["localhost:8082"]}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker

      - name: Docker login
        run: echo "nexus111" | docker login localhost:8082 -u admin --password-stdin

      - name: Build image
        run: docker build -t localhost:8082/app:${{ github.sha }} .

      - name: Push image
        run: docker push localhost:8082/app:${{ github.sha }}
