name: Deploy Template

on:
  workflow_call:
    secrets:
      NEXUS_USERNAME:
        required: true
      NEXUS_PASSWORD:
        required: true
      # NEXUS_REGISTRY n'est plus utilisé ici, on le met en dur
      NEXUS_REGISTRY:
        required: false

jobs:
  deploy:
    runs-on: self-hosted   # Important : force l'utilisation de votre VM
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Allow insecure registry
        run: |
          echo '{"insecure-registries": ["localhost:8081"]}' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker

      - name: Log in to Nexus Registry
        uses: docker/login-action@v3
        with:
          registry: localhost:8081
          username: ${{ secrets.NEXUS_USERNAME }}
          password: ${{ secrets.NEXUS_PASSWORD }}

      - name: Build Docker image
        run: docker build -t localhost:8081/app:${{ github.sha }} .

      - name: Push Docker image
        run: docker push localhost:8081/app:${{ github.sha }}
