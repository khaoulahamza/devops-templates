              echo "              value: \"admin\"" >> "${DBPATH}"
              echo "            - name: MONGO_INITDB_ROOT_PASSWORD" >> "${DBPATH}"
              echo "              value: \"changeme123\"" >> "${DBPATH}"
              echo "          volumeMounts:" >> "${DBPATH}"
              echo "            - name: mongodb-storage" >> "${DBPATH}"
              echo "              mountPath: /data/db" >> "${DBPATH}"
              echo "          resources:" >> "${DBPATH}"
              echo "            requests:" >> "${DBPATH}"
              echo "              memory: \"256Mi\"" >> "${DBPATH}"
              echo "              cpu: \"250m\"" >> "${DBPATH}"
              echo "            limits:" >> "${DBPATH}"
              echo "              memory: \"512Mi\"" >> "${DBPATH}"
              echo "              cpu: \"500m\"" >> "${DBPATH}"
              echo "          readinessProbe:" >> "${DBPATH}"
              echo "            exec:" >> "${DBPATH}"
              echo "              command: [\"mongosh\", \"--eval\", \"db.adminCommand('ping')\"]" >> "${DBPATH}"
              echo "            initialDelaySeconds: 10" >> "${DBPATH}"
              echo "            periodSeconds: 5" >> "${DBPATH}"
              echo "  volumeClaimTemplates:" >> "${DBPATH}"
              echo "    - metadata:" >> "${DBPATH}"
              echo "        name: mongodb-storage" >> "${DBPATH}"
              echo "      spec:" >> "${DBPATH}"
              echo "        accessModes: [\"ReadWriteOnce\"]" >> "${DBPATH}"
              echo "        resources:" >> "${DBPATH}"
