name: Mono Pipeline

on:
  workflow_call:
    secrets:
      GITOPS_TOKEN:
        required: true

jobs:
  pipeline:
    runs-on: self-hosted
    timeout-minutes: 60

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: testuser
          POSTGRES_PASSWORD: testpass
          POSTGRES_DB: testdb
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U testuser"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      # ── CLEAN WORKSPACE ────────────────────────────────────────
      - name: Clean workspace
        run: |
          sudo git clean -ffdx 2>/dev/null || \
          sudo find "${{ github.workspace }}" -mindepth 1 -delete 2>/dev/null || true

      - name: Checkout
        uses: actions/checkout@v4

      # ── BUILDKIT ───────────────────────────────────────────────
      - name: Enable Docker BuildKit
        run: echo "DOCKER_BUILDKIT=1" >> "$GITHUB_ENV"

      # ── APP NAME ───────────────────────────────────────────────
      - name: Set APP_NAME
        run: |
          APP_NAME=$(echo "${{ github.event.repository.name }}" \
            | tr '[:upper:]' '[:lower:]' \
            | sed 's/[^a-z0-9-]/-/g')
          echo "APP_NAME=${APP_NAME}" >> "$GITHUB_ENV"

      # ── DETECT MODE ────────────────────────────────────────────
      - name: Detect deploy mode & frontend location
        run: |
          HAS_FRONT="false"
          HAS_BACK="false"
          FRONT_FILE=""
          FRONT_CONTEXT="."
          BACK_FILE=""
          BACK_CONTEXT="."
          MONO_FILE=""
          FRONT_AT_ROOT="false"

          if [ -f "frontend/Dockerfile" ]; then
            HAS_FRONT="true"
            FRONT_FILE="frontend/Dockerfile"
            FRONT_CONTEXT="frontend"
          elif [ -f "Dockerfile.frontend" ]; then
            HAS_FRONT="true"
            FRONT_FILE="Dockerfile.frontend"
            FRONT_CONTEXT="."
          fi

          if [ "${HAS_FRONT}" = "true" ] && [ -f "package.json" ] && [ -f "angular.json" ]; then
            FRONT_AT_ROOT="true"
          fi

          if [ -f "backend/Dockerfile" ]; then
            HAS_BACK="true"
            BACK_FILE="backend/Dockerfile"
            BACK_CONTEXT="backend"
          elif [ -f "Dockerfile.backend" ]; then
            HAS_BACK="true"
            BACK_FILE="Dockerfile.backend"
            BACK_CONTEXT="."
          fi

          if [ "${HAS_FRONT}" = "true" ] && [ "${HAS_BACK}" = "true" ]; then
            DEPLOY_MODE="dual"
          elif [ "${HAS_FRONT}" = "true" ]; then
            DEPLOY_MODE="front-only"
          elif [ "${HAS_BACK}" = "true" ]; then
            DEPLOY_MODE="back-only"
          elif [ -f "Dockerfile" ]; then
            DEPLOY_MODE="mono"
            MONO_FILE="Dockerfile"
          else
            echo "❌ Aucun Dockerfile trouvé."
            exit 1
          fi

          echo "DEPLOY_MODE=${DEPLOY_MODE}"     >> "$GITHUB_ENV"
          echo "HAS_FRONT=${HAS_FRONT}"         >> "$GITHUB_ENV"
          echo "HAS_BACK=${HAS_BACK}"           >> "$GITHUB_ENV"
          echo "FRONT_FILE=${FRONT_FILE}"       >> "$GITHUB_ENV"
          echo "FRONT_CONTEXT=${FRONT_CONTEXT}" >> "$GITHUB_ENV"
          echo "BACK_FILE=${BACK_FILE}"         >> "$GITHUB_ENV"
          echo "BACK_CONTEXT=${BACK_CONTEXT}"   >> "$GITHUB_ENV"
          echo "MONO_FILE=${MONO_FILE}"         >> "$GITHUB_ENV"
          echo "FRONT_AT_ROOT=${FRONT_AT_ROOT}" >> "$GITHUB_ENV"
          echo "✅ Deploy mode : ${DEPLOY_MODE}"

      # ── DETECT BACKEND TECH ────────────────────────────────────
      - name: Detect backend technology & Java version
        run: |
          if [ -f "backend/pom.xml" ]; then
            echo "HAS_MAVEN=true" >> "$GITHUB_ENV"
            JAVA_VERSION=$(grep -oP '(?<=<java.version>)[^<]+' backend/pom.xml 2>/dev/null | head -1)
            [ -z "${JAVA_VERSION}" ] && JAVA_VERSION=$(grep -oP '(?<=<maven.compiler.source>)[^<]+' backend/pom.xml 2>/dev/null | head -1)
            [ -z "${JAVA_VERSION}" ] && JAVA_VERSION="17"
            echo "JAVA_VERSION=${JAVA_VERSION}" >> "$GITHUB_ENV"
          else
            echo "HAS_MAVEN=false" >> "$GITHUB_ENV"
          fi
          [ -f "backend/requirements.txt" ] && echo "HAS_PYTHON=true" >> "$GITHUB_ENV" || echo "HAS_PYTHON=false" >> "$GITHUB_ENV"
          [ -f "backend/go.mod"           ] && echo "HAS_GO=true"     >> "$GITHUB_ENV" || echo "HAS_GO=false"     >> "$GITHUB_ENV"

      # ── INSTALL FRONTEND ───────────────────────────────────────
      - name: Install frontend dependencies
        if: env.HAS_FRONT == 'true'
        run: |
          if [ "${{ env.FRONT_AT_ROOT }}" = "true" ]; then
            docker run --rm \
              --user "$(id -u):$(id -g)" \
              -v "$PWD:/app" -w /app \
              192.168.1.239:8085/selfkhaoula/node:20-alpine \
              npm install --legacy-peer-deps
          else
            docker run --rm \
              --user "$(id -u):$(id -g)" \
              -v "$PWD/frontend:/app" -w /app \
              192.168.1.239:8085/selfkhaoula/node:20-alpine \
              npm install --legacy-peer-deps
          fi

      # ── UNIT TESTS & LINT (avant build) ─────────────────────────
      - name: "🧪 Test frontend (Angular)"
        if: env.HAS_FRONT == 'true'
        run: |
          if [ "${{ env.FRONT_AT_ROOT }}" = "true" ]; then
            docker run --rm \
              --user "$(id -u):$(id -g)" \
              -v "$PWD:/app" -w /app \
              --cap-add=SYS_ADMIN \
              192.168.1.239:8085/selfkhaoula/node:20-browsers \
              npm test -- --watch=false --browsers=ChromeHeadlessNoSandbox 2>&1 | tee frontend-test.log
          else
            docker run --rm \
              --user "$(id -u):$(id -g)" \
              -v "$PWD/frontend:/app" -w /app \
              --cap-add=SYS_ADMIN \
              192.168.1.239:8085/selfkhaoula/node:20-browsers \
              npm test -- --watch=false --browsers=ChromeHeadlessNoSandbox 2>&1 | tee frontend-test.log
          fi

      - name: "🧪 Test backend (Java/Maven)"
        if: env.HAS_MAVEN == 'true'
        run: |
          docker run --rm \
            --network host \
            --user "$(id -u):$(id -g)" \
            -v "$PWD/backend:/app" -w /app \
            -v "$HOME/.m2:/root/.m2" \
            -e MAVEN_OPTS="-Xmx512m" \
            -e SPRING_DATASOURCE_URL="jdbc:postgresql://localhost:5432/testdb" \
            -e SPRING_DATASOURCE_USERNAME="testuser" \
            -e SPRING_DATASOURCE_PASSWORD="testpass" \
            192.168.1.239:8085/selfkhaoula/maven:3.9-eclipse-temurin-${{ env.JAVA_VERSION }} \
            mvn test -B -Dspring.profiles.active=test -DskipTests=false \
          || {
            echo "=== SUREFIRE FAILURE REPORTS ==="
            find "$PWD/backend/target/surefire-reports" -name "*.txt" \
              -exec echo "--- {} ---" \; -exec cat {} \; 2>/dev/null || true
            exit 1
          }

      - name: "🧪 Test backend (Python)"
        if: env.HAS_PYTHON == 'true'
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "$PWD/backend:/app" -w /app \
            192.168.1.239:8085/selfkhaoula/python:3.11-slim \
            sh -c "pip install -r requirements.txt -q && pytest --tb=short"

      - name: "🧪 Test backend (Go)"
        if: env.HAS_GO == 'true'
        run: |
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "$PWD/backend:/app" -w /app \
            192.168.1.239:8085/selfkhaoula/golang:1.22-alpine \
            go test ./... -v

      - name: "🔍 Lint frontend (ESLint)"
        if: env.HAS_FRONT == 'true'
        run: |
          MOUNT=$( [ "${{ env.FRONT_AT_ROOT }}" = "true" ] && echo "$PWD" || echo "$PWD/frontend" )
          docker run --rm \
            --user "$(id -u):$(id -g)" \
            -v "${MOUNT}:/app" -w /app \
            192.168.1.239:8085/selfkhaoula/node:20-alpine \
            sh -c "if node -e \"const p=require('./package.json'); process.exit(p.scripts&&p.scripts.lint?0:1);\" 2>/dev/null; then npm run lint; else echo '⚠️ Pas de script lint, ignoré.'; fi"

      - name: "🔍 Lint backend (Checkstyle)"
        if: env.HAS_MAVEN == 'true'
        run: |
          if grep -qi "checkstyle" backend/pom.xml; then
            docker run --rm \
              --user "$(id -u):$(id -g)" \
              -v "$PWD/backend:/app" -w /app \
              192.168.1.239:8085/selfkhaoula/maven:3.9-eclipse-temurin-${{ env.JAVA_VERSION }} \
              mvn checkstyle:check -B
          else
            echo "⚠️ Checkstyle non configuré, ignoré."
          fi

      - name: "🔍 Lint Dockerfiles (hadolint)"
        run: |
          lint_dockerfile() {
            local FILE="$1"
            if [ -z "${FILE}" ] || [ ! -f "${FILE}" ]; then
              echo "⚠️ Dockerfile non trouvé: ${FILE}, ignoré."
              return 0
            fi
            if ! grep -q '^FROM\s' "${FILE}"; then
              echo "❌ ${FILE} ne contient aucune instruction FROM."
              head -n10 "${FILE}"
              exit 1
            fi
            local DIR
            DIR=$(dirname "${FILE}")
            local BASE
            BASE=$(basename "${FILE}")
            echo "→ Lint: ${FILE}"
            docker run --rm \
              -v "${GITHUB_WORKSPACE}/${DIR}:/mnt" \
              192.168.1.239:8085/selfkhaoula/hadolint:latest \
              hadolint --failure-threshold error "/mnt/${BASE}" || \
              echo "⚠️ hadolint warnings ignorés pour ${FILE}"
          }
          case "${{ env.DEPLOY_MODE }}" in
            dual)       lint_dockerfile "${{ env.FRONT_FILE }}"; lint_dockerfile "${{ env.BACK_FILE }}" ;;
            front-only) lint_dockerfile "${{ env.FRONT_FILE }}" ;;
            back-only)  lint_dockerfile "${{ env.BACK_FILE }}"  ;;
            mono)       lint_dockerfile "${{ env.MONO_FILE }}"  ;;
          esac

      # ── DOCKER LOGIN ───────────────────────────────────────────
      - name: Trust Nexus certificate
        run: |
          sudo mkdir -p /etc/docker/certs.d/192.168.1.239:8085
          sudo cp /home/ubuntu/nexus/certs/nexus.crt /etc/docker/certs.d/192.168.1.239:8085/ca.crt
          sudo cp /home/ubuntu/nexus/certs/nexus.crt /usr/local/share/ca-certificates/nexus.crt
          sudo update-ca-certificates

      - name: Docker login
        run: echo "nexus111" | docker login 192.168.1.239:8085 -u admin --password-stdin

      # ── BUILD (sans cache distant) ─────────────────────────────
      - name: "🐳 Build (mono)"
        if: env.DEPLOY_MODE == 'mono'
        run: |
          IMAGE="192.168.1.239:8085/selfkhaoula/${{ env.APP_NAME }}:${{ github.sha }}"
          docker build -f "${{ env.MONO_FILE }}" -t "${IMAGE}" .
          echo "LOCAL_IMAGE=${IMAGE}" >> "$GITHUB_ENV"

      - name: "🐳 Build (front-only)"
        if: env.DEPLOY_MODE == 'front-only'
        run: |
          IMAGE="192.168.1.239:8085/selfkhaoula/${{ env.APP_NAME }}-front:${{ github.sha }}"
          docker build -f "${{ env.FRONT_FILE }}" -t "${IMAGE}" "${{ env.FRONT_CONTEXT }}"
          echo "LOCAL_IMAGE=${IMAGE}" >> "$GITHUB_ENV"

      - name: "🐳 Build (back-only)"
        if: env.DEPLOY_MODE == 'back-only'
        run: |
          IMAGE="192.168.1.239:8085/selfkhaoula/${{ env.APP_NAME }}-back:${{ github.sha }}"
          docker build -f "${{ env.BACK_FILE }}" -t "${IMAGE}" "${{ env.BACK_CONTEXT }}"
          echo "LOCAL_IMAGE=${IMAGE}" >> "$GITHUB_ENV"

      - name: "🐳 Build frontend (dual)"
        if: env.DEPLOY_MODE == 'dual'
        run: |
          FRONT_IMAGE="192.168.1.239:8085/selfkhaoula/${{ env.APP_NAME }}-front:${{ github.sha }}"
          docker build -f "${{ env.FRONT_FILE }}" -t "${FRONT_IMAGE}" "${{ env.FRONT_CONTEXT }}"
          echo "FRONT_LOCAL_IMAGE=${FRONT_IMAGE}" >> "$GITHUB_ENV"

      - name: "🐳 Build backend (dual)"
        if: env.DEPLOY_MODE == 'dual'
        run: |
          BACK_IMAGE="192.168.1.239:8085/selfkhaoula/${{ env.APP_NAME }}-back:${{ github.sha }}"
          docker build -f "${{ env.BACK_FILE }}" -t "${BACK_IMAGE}" "${{ env.BACK_CONTEXT }}"
          echo "BACK_LOCAL_IMAGE=${BACK_IMAGE}" >> "$GITHUB_ENV"

      # ── TESTS SUR IMAGE LOCALE (Trivy + Smoke) avant push ────────
      - name: "🔒 Trivy scan (mono)"
        if: env.DEPLOY_MODE == 'mono'
        run: |
          trivy image --severity HIGH,CRITICAL --exit-code 0 --ignore-unfixed "${{ env.LOCAL_IMAGE }}"

      - name: "🔒 Trivy scan (front-only)"
        if: env.DEPLOY_MODE == 'front-only'
        run: |
          trivy image --severity HIGH,CRITICAL --exit-code 0 --ignore-unfixed "${{ env.LOCAL_IMAGE }}"

      - name: "🔒 Trivy scan (back-only)"
        if: env.DEPLOY_MODE == 'back-only'
        run: |
          trivy image --severity HIGH,CRITICAL --exit-code 0 --ignore-unfixed "${{ env.LOCAL_IMAGE }}"

      - name: "🔒 Trivy scan (dual)"
        if: env.DEPLOY_MODE == 'dual'
        run: |
          trivy image --severity HIGH,CRITICAL --exit-code 0 --ignore-unfixed "${{ env.FRONT_LOCAL_IMAGE }}"
          trivy image --severity HIGH,CRITICAL --exit-code 0 --ignore-unfixed "${{ env.BACK_LOCAL_IMAGE }}"

      - name: "🔥 Smoke tests (mono/front/back)"
        if: env.DEPLOY_MODE != 'dual'
        run: |
          echo "→ Smoke test : ${{ env.LOCAL_IMAGE }}"
          CONTAINER_ID=$(docker run -d --rm "${{ env.LOCAL_IMAGE }}" 2>/dev/null || true)
          if [ -z "${CONTAINER_ID}" ]; then
            echo "❌ Container non démarré"
            exit 1
          fi
          sleep 5
          STATUS=$(docker inspect --format='{{.State.Status}}' "${CONTAINER_ID}" 2>/dev/null || echo "gone")
          if [ "${STATUS}" = "exited" ]; then
            EXIT_CODE=$(docker inspect --format='{{.State.ExitCode}}' "${CONTAINER_ID}" 2>/dev/null || echo "1")
            docker logs "${CONTAINER_ID}" 2>/dev/null || true
            [ "${EXIT_CODE}" != "0" ] && echo "❌ Smoke test échoué (exit ${EXIT_CODE})" && exit 1
          fi
          docker stop "${CONTAINER_ID}" 2>/dev/null || true
          echo "✅ OK"

      - name: "🔥 Smoke tests (dual)"
        if: env.DEPLOY_MODE == 'dual'
        run: |
          for IMAGE in "${{ env.FRONT_LOCAL_IMAGE }}" "${{ env.BACK_LOCAL_IMAGE }}"; do
            echo "→ Smoke test : ${IMAGE}"
            CONTAINER_ID=$(docker run -d --rm "${IMAGE}" 2>/dev/null || true)
            if [ -z "${CONTAINER_ID}" ]; then
              echo "❌ Container non démarré"
              exit 1
            fi
            sleep 5
            STATUS=$(docker inspect --format='{{.State.Status}}' "${CONTAINER_ID}" 2>/dev/null || echo "gone")
            if [ "${STATUS}" = "exited" ]; then
              EXIT_CODE=$(docker inspect --format='{{.State.ExitCode}}' "${CONTAINER_ID}" 2>/dev/null || echo "1")
              docker logs "${CONTAINER_ID}" 2>/dev/null || true
              [ "${EXIT_CODE}" != "0" ] && echo "❌ Smoke test échoué (exit ${EXIT_CODE})" && exit 1
            fi
            docker stop "${CONTAINER_ID}" 2>/dev/null || true
            echo "✅ OK"
          done

      # ── PUSH (simple, sans cache) ──────────────────────────────
      - name: "🐳 Push (mono)"
        if: env.DEPLOY_MODE == 'mono'
        run: |
          docker push "${{ env.LOCAL_IMAGE }}"
          echo "SMOKE_IMAGES=${{ env.LOCAL_IMAGE }}" >> "$GITHUB_ENV"

      - name: "🐳 Push (front-only)"
        if: env.DEPLOY_MODE == 'front-only'
        run: |
          docker push "${{ env.LOCAL_IMAGE }}"
          echo "SMOKE_IMAGES=${{ env.LOCAL_IMAGE }}" >> "$GITHUB_ENV"

      - name: "🐳 Push (back-only)"
        if: env.DEPLOY_MODE == 'back-only'
        run: |
          docker push "${{ env.LOCAL_IMAGE }}"
          echo "SMOKE_IMAGES=${{ env.LOCAL_IMAGE }}" >> "$GITHUB_ENV"

      - name: "🐳 Push (dual)"
        if: env.DEPLOY_MODE == 'dual'
        run: |
          docker push "${{ env.FRONT_LOCAL_IMAGE }}"
          docker push "${{ env.BACK_LOCAL_IMAGE }}"
          echo "SMOKE_IMAGES=${{ env.FRONT_LOCAL_IMAGE }} ${{ env.BACK_LOCAL_IMAGE }}" >> "$GITHUB_ENV"

      # ── GITOPS (après push réussi) ──────────────────────────────
      - name: "🚀 Update GitOps"
        env:
          GITOPS_PAT: ${{ secrets.GITOPS_TOKEN }}
        run: |
          APP_NAME="${{ env.APP_NAME }}"
          SHA="${{ github.sha }}"
          REGISTRY="192.168.1.239:8085/selfkhaoula"
          GITOPS_REPO="https://x-access-token:${GITOPS_PAT}@github.com/khaoulahamza/gitops-environments.git"

          git clone "${GITOPS_REPO}" gitops-environments
          cd gitops-environments
          git config user.email "ci@github.com"
          git config user.name "GitHub Actions"

          write_values() {
            local COMP="$1" REPO="$2" TAG="$3"
            local VPATH="environments/staging/${COMP}/values.yaml"
            mkdir -p "$(dirname "${VPATH}")"
            if [ ! -f "${VPATH}" ]; then
              printf 'name: %s\nreplicaCount: 1\nimage:\n  repository: "%s"\n  tag: "%s"\n  pullPolicy: IfNotPresent\nimagePullSecrets:\n  - name: nexus-registry-secret\nservice:\n  type: ClusterIP\n  port: 80\n  targetPort: 80\ningress:\n  enabled: true\n  className: nginx\n  host: %s.staging.local\n  path: /\n  pathType: Prefix\nresources:\n  limits:\n    cpu: 500m\n    memory: 512Mi\n  requests:\n    cpu: 250m\n    memory: 256Mi\nenv: []\n' \
                "${COMP}" "${REPO}" "${TAG}" "${COMP}" > "${VPATH}"
            else
              sed -i "s|repository:.*|repository: \"${REPO}\"|" "${VPATH}"
              sed -i "s|tag:.*|tag: \"${TAG}\"|"                "${VPATH}"
            fi
          }

          write_argocd() {
            local COMP="$1"
            local APATH="argocd-applications/${COMP}.yaml"
            mkdir -p argocd-applications
            [ -f "${APATH}" ] && return 0
            printf 'apiVersion: argoproj.io/v1alpha1\nkind: Application\nmetadata:\n  name: %s\n  namespace: argocd\nspec:\n  project: stagiaires\n  sources:\n    - repoURL: https://github.com/khaoulahamza/devops-templates\n      targetRevision: main\n      path: helm-charts/app-generic\n      helm:\n        valueFiles:\n          - $values/environments/staging/%s/values.yaml\n    - repoURL: https://github.com/khaoulahamza/gitops-environments\n      targetRevision: main\n      ref: values\n  destination:\n    server: https://kubernetes.default.svc\n    namespace: staging-%s\n  syncPolicy:\n    automated:\n      prune: true\n      selfHeal: true\n    syncOptions:\n      - CreateNamespace=true\n' \
              "${COMP}" "${COMP}" "${COMP}" > "${APATH}"
          }

          case "${{ env.DEPLOY_MODE }}" in
            mono)
              write_values "${APP_NAME}"       "${REGISTRY}/${APP_NAME}"       "${SHA}"
              write_argocd "${APP_NAME}"
              COMMIT_MSG="[${APP_NAME}] deploy -> ${SHA}"
              ;;
            front-only)
              write_values "${APP_NAME}-front" "${REGISTRY}/${APP_NAME}-front" "${SHA}"
              write_argocd "${APP_NAME}-front"
              COMMIT_MSG="[${APP_NAME}] deploy front -> ${SHA}"
              ;;
            back-only)
              write_values "${APP_NAME}-back"  "${REGISTRY}/${APP_NAME}-back"  "${SHA}"
              write_argocd "${APP_NAME}-back"
              COMMIT_MSG="[${APP_NAME}] deploy back -> ${SHA}"
              ;;
            dual)
              write_values "${APP_NAME}-front" "${REGISTRY}/${APP_NAME}-front" "${SHA}"
              write_values "${APP_NAME}-back"  "${REGISTRY}/${APP_NAME}-back"  "${SHA}"
              write_argocd "${APP_NAME}-front"
              write_argocd "${APP_NAME}-back"
              COMMIT_MSG="[${APP_NAME}] deploy front+back -> ${SHA}"
              ;;
          esac

          git add .
          git diff --cached --quiet && echo "Rien à commiter." && exit 0
          git commit -m "${COMMIT_MSG}"
          git pull --rebase origin main
          git push origin main
