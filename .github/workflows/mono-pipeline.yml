              echo "  ports:" >> "${DBPATH}"
              echo "    - port: 3306" >> "${DBPATH}"
              echo "      targetPort: 3306" >> "${DBPATH}"
              echo "  clusterIP: None" >> "${DBPATH}"
              echo "---" >> "${DBPATH}"
              echo "apiVersion: apps/v1" >> "${DBPATH}"
              echo "kind: StatefulSet" >> "${DBPATH}"
              echo "metadata:" >> "${DBPATH}"
              echo "  name: mysql-db-${COMP}" >> "${DBPATH}"
              echo "  namespace: staging-${COMP}" >> "${DBPATH}"
              echo "spec:" >> "${DBPATH}"
              echo "  serviceName: mysql-service-${COMP}" >> "${DBPATH}"
              echo "  replicas: 1" >> "${DBPATH}"
              echo "  selector:" >> "${DBPATH}"
              echo "    matchLabels:" >> "${DBPATH}"
              echo "      app: mysql-db-${COMP}" >> "${DBPATH}"
              echo "  template:" >> "${DBPATH}"
              echo "    metadata:" >> "${DBPATH}"
              echo "      labels:" >> "${DBPATH}"
              echo "        app: mysql-db-${COMP}" >> "${DBPATH}"
              echo "    spec:" >> "${DBPATH}"
              echo "      containers:" >> "${DBPATH}"
              echo "        - name: mysql" >> "${DBPATH}"
              echo "          image: mysql:8.0" >> "${DBPATH}"
              echo "          ports:" >> "${DBPATH}"
              echo "            - containerPort: 3306" >> "${DBPATH}"
              echo "          env:" >> "${DBPATH}"
              echo "            - name: MYSQL_DATABASE" >> "${DBPATH}"
              echo "              value: \"${COMP//-/_}_db\"" >> "${DBPATH}"
              echo "            - name: MYSQL_USER" >> "${DBPATH}"
              echo "              value: \"admin\"" >> "${DBPATH}"
              echo "            - name: MYSQL_PASSWORD" >> "${DBATH}"
              echo "              value: \"changeme123\"" >> "${DBPATH}"
              echo "            - name: MYSQL_ROOT_PASSWORD" >> "${DBPATH}"
              echo "              value: \"rootpassword123\"" >> "${DBPATH}"
              echo "          volumeMounts:" >> "${DBPATH}"
              echo "            - name: mysql-storage" >> "${DBPATH}"
              echo "              mountPath: /var/lib/mysql" >> "${DBPATH}"
              echo "          resources:" >> "${DBPATH}"
              echo "            requests:" >> "${DBPATH}"
              echo "              memory: \"256Mi\"" >> "${DBPATH}"
              echo "              cpu: \"250m\"" >> "${DBPATH}"
              echo "            limits:" >> "${DBPATH}"
              echo "              memory: \"512Mi\"" >> "${DBPATH}"
              echo "              cpu: \"500m\"" >> "${DBPATH}"
