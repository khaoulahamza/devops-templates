              echo "✅ PostgreSQL généré pour ${COMP}"
              
            elif [ "${DB_TYPE}" = "mysql" ]; then
              echo "---" > "${DBPATH}"
              echo "apiVersion: v1" >> "${DBPATH}"
              echo "kind: Service" >> "${DBPATH}"
              echo "metadata:" >> "${DBPATH}"
              echo "  name: mysql-service-${COMP}" >> "${DBPATH}"
              echo "  namespace: staging-${COMP}" >> "${DBPATH}"
              echo "spec:" >> "${DBPATH}"
