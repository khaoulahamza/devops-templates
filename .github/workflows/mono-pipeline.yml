              echo "            limits:" >> "${DBPATH}"
              echo "              memory: \"512Mi\"" >> "${DBPATH}"
              echo "              cpu: \"500m\"" >> "${DBPATH}"
              echo "          readinessProbe:" >> "${DBPATH}"
              echo "            exec:" >> "${DBPATH}"
              echo "              command: [\"pg_isready\", \"-U\", \"admin\"]" >> "${DBPATH}"
